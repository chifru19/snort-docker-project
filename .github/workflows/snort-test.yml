name: Snort Rule Validation

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate-rules:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Local Snort Image
        run: docker build -t local-snort .

      - name: Snort Syntax Check
        run: |
          docker run --rm -v ${{ github.workspace }}/config:/etc/snort/rules \
          local-snort snort -c /etc/snort/rules/local.rules -T