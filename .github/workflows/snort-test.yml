name: Snort Rule Validation

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate-rules:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Snort Syntax Check
        run: |
          # Pulls the official Snort 3 image from the verified registry
          docker run --rm -v ${{ github.workspace }}/config:/etc/snort/rules \
          index.docker.io/snort/snort3:latest snort -c /etc/snort/rules/local.rules -T