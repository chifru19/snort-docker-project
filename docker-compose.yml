services:
  snort3:
    build: .
    container_name: snort_ids
    network_mode: "host"
    volumes:
      - ./config:/etc/snort/rules
      - ./logs:/var/log/snort
    # Removed -R flag to prevent the pidfile suffix error
    command: snort -c /etc/snort/rules/local.rules -A console -i en0
    stdin_open: true
    tty: true