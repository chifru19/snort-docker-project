services:
  snort3:
    build: .
    container_name: snort_ids
    network_mode: "host"
    volumes:
      - ./config:/etc/snort/rules
      - ./logs:/var/log/snort
    # Snort 3 handles 'any' interface (DLT 113) without crashing
    command: snort -c /etc/snort/rules/local.rules -i any -A alert_fast
    stdin_open: true
    tty: true