services:
  snort3:
    build: .
    container_name: snort_ids
    network_mode: "host"
    volumes:
      - ./config:/etc/snort/rules
      - ./logs:/var/log/snort
    # Simplified Snort 3 command for console output
    command: snort -c /etc/snort/rules/local.rules -i any -A cmg
    stdin_open: true
    tty: true